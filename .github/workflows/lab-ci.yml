name: lab-ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore and test Lab (excludes deprecated Desktop)
        run: |
          dotnet restore src/IChing.Lab.Tests/IChing.Lab.Tests.csproj
          dotnet test src/IChing.Lab.Tests/IChing.Lab.Tests.csproj --no-restore -v minimal
      - name: Build Accounts API
        run: dotnet build src/IChing.Accounts.Api/IChing.Accounts.Api.csproj -v minimal
