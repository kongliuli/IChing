spring:
  application:
    name: iching-server
  datasource:
    url: jdbc:mysql://localhost:3306/iching?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: iching
    password: iching
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

iching:
  jwt:
    secret: iching-mvp-jwt-secret-change-me-in-production
    ttl-seconds: 604800
  aes:
    secret: iching-mvp-aes16
  pricing:
    deep-report: 38.00
    membership-year: 198.00

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.iching: INFO
